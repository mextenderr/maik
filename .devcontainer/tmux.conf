# Mouse: scroll with the wheel, click to select panes/windows, drag borders to resize.
set -g mouse on

# Large scrollback buffer so output isn't lost.
set -g history-limit 50000

# True color + correct terminal type.
set -g default-terminal "tmux-256color"

# Start window/pane numbering at 1 and keep numbers tidy when windows close.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# No lag after pressing Escape (helps editors).
set -sg escape-time 10

# More intuitive split bindings that keep the current directory.
#   prefix |  -> split left/right
#   prefix -  -> split top/bottom
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload this config without restarting tmux:  prefix r
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"
